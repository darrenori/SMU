name: Bug report
description: Report a reproducible problem without including client or confidential information.
title: "Bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include matter content, personal data, privileged information or credentials.
  - type: input
    id: version
    attributes:
      label: IKEBOT version
      placeholder: 2.0.0
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options: [Chrome extension, Product site]
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behaviour
    validations:
      required: true
